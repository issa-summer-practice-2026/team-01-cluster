name: CI Pipeline

on: [push, pull_request]

permissions:
  contents: write
  packages: write

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd backend
          python -m venv ../.venv
          ../.venv/bin/pip install -r dev-requirements.txt

      - name: Compile syntax
        run: |
          cd backend
          ../.venv/bin/python -m compileall .

      - name: Lint (Ruff)
        run: |
          cd backend
          ../.venv/bin/ruff check .

      - name: Test & Coverage
        run: |
          cd backend
          ../.venv/bin/pytest --cov=app --cov-fail-under=80

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/.coverage

      - name: Smoke Test (Boot & cURL)
        run: |
          cd backend
          ../.venv/bin/python -m app &
          sleep 5
          curl --fail http://127.0.0.1:8000/health

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install & Verificari
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run typecheck
          npm run test
          npm run build

  deliver:
    name: Deliver Docker Image & Create Auto-Release
    # Rulam doar dacă testele anterioare au trecut ȘI suntem pe branch-ul main (după merge)
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      # 1. Ne autentificăm în GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Generăm un tag unic pentru versiune bazat pe numărul rulării pipeline-ului (ex: v1.0.5)
      - name: Set up Image Tag
        id: version
        run: echo "TAG=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      # 3. Construim și trimitem imaginea Docker (folosește Dockerfile-ul creat la Task 1)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ env.TAG }}

      # 4. Creăm release-ul pe GitHub și generăm automat notele din istoricul de PR-uri
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TAG }}
          name: Release v${{ env.TAG }}
          generate_release_notes: true
