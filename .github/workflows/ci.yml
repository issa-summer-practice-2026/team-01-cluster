name: CI Pipeline

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd backend
          python -m venv ../.venv
          ../.venv/bin/pip install -r dev-requirements.txt

      - name: Compile syntax
        run: |
          cd backend
          ../.venv/bin/python -m compileall .

      - name: Lint (Ruff)
        run: |
          cd backend
          ../.venv/bin/ruff check .

      - name: Build Docker Image
        run: docker build -t cluster:latest .

      - name: Test & Coverage (Inside Container)
        run: docker run cluster pytest --cov=app --cov-fail-under=80

      - name: Smoke Test (Container Boot & cURL)
        run: |
          # Pornim containerul în fundal (detached) pe portul 8000
          docker run -d -p 8000:8000 --name test_cluster cluster
          sleep 5
          # Verificăm dacă răspunde
          curl --fail http://127.0.0.1:8000/health

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install & Verificari
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run typecheck
          npm run test
          npm run build
